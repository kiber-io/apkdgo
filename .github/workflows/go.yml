# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build

on:
  push:
    branches: [ "main" ]
    paths:
      - apkd/**.go
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: build (${{ matrix.os }}-${{ matrix.arch }})
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x"]
        target: [1]
        os: [linux, windows]
        arch: [amd64, arm64]

    steps:
    # - name: Show GitHub context
    #   env:
    #     GITHUB_CONTEXT: ${{ toJson(github) }}
    #   run: echo "$GITHUB_CONTEXT"

    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false
    
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: ${{ matrix.go }}
        cache: true

    - name: Test (linux/amd64 only)
      if: ${{ matrix.os == 'linux' && matrix.arch == 'amd64' }}
      run: go test -v -timeout 10m ./apkd/...

    - name: Build
      shell: bash
      run: |
        set -euo pipefail

        os="${{ matrix.os }}"
        arch="${{ matrix.arch }}"
        OUTPUT_DIR="dist"
        
        mkdir -p "$OUTPUT_DIR"
        EXT=""
        if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi

        output_name="apkd-${os}-${arch}${EXT}"

        COMMIT="${{ github.sha }}"
        SHORT_COMMIT="${COMMIT:0:9}"
        VERSION="dev-${SHORT_COMMIT}"

        BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

        GOOS=${os} GOARCH=${arch} CGO_ENABLED=0 \
          go build -trimpath -v -o "$OUTPUT_DIR/$output_name" \
          -ldflags "-s -w \
            -X main.version=$VERSION \
            -X main.commit=$COMMIT \
            -X main.buildDate=$BUILD_DATE" \
          ./apkd

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: apkd-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/apkd-${{ matrix.os }}-${{ matrix.arch }}*
        if-no-files-found: error
